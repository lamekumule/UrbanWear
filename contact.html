<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000000;
            padding: 30px;
        }

        form{
            width: 400px;
            margin: auto;
            margin-top: 50px;
            margin-bottom: 50px;
            background-color: rgb(0, 0, 0);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgb(152, 149, 149);
        }

        label{
            display: block;
            margin-top: 15p;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        textarea {
            height: 120px;
            resize: none;
        }
        
        .buttons {
            margin-top: 20px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        .submit-btn {
            background-color: #706e6e;
            color: rgb(255, 255, 255);
        }

        .clear-btn {
            background-color: #2a2625;
            color: white;
            margin-right: 10px;

        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <!--Header Section-->
    <header>
        <h1>Contact Us</h1>
        <p>Your one-stop shop for quality products</p>
    </header>

    <form action="acknowledgement.html" method="get">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>

        <div class="buttons">
            <button type="reset" class="clear-btn">Clear</button>
            <button type="submit" class="submit-btn">Submit</button>
        </div>
    </form>

<!--Footer-->
    <footer>
		<p>Contact Info | Social Media</p>
		<p> &copy; 2026 UrbanWear</p>
	 </footer>
</body>
</html>
